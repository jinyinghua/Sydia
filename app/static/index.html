<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sydia</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- ═══ 顶部状态栏 ═══ -->
    <header id="topbar">
        <div class="topbar-left">
            <span class="logo">◉ Sydia</span>
            <span class="status-badge" id="statusBadge">IDLE</span>
        </div>
        <div class="topbar-center" id="currentUrl">—</div>
        <div class="topbar-right">
            <span class="time" id="clock"></span>
        </div>
    </header>

    <!-- ═══ 三栏主体 ═══ -->
    <main id="layout">

        <!-- ── 左栏: Ask AI (中间人脑聊天) ── -->
        <aside id="chatPanel">
            <div class="panel-header">Ask AI</div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg assistant">你好，我是 Sydia 中间人助手。你可以告诉我你想让 Agent 做什么，或者询问当前状态。</div>
            </div>
            <form id="chatForm" class="chat-input-area" autocomplete="off">
                <input type="text" id="chatInput" placeholder="输入指令或提问..." />
                <button type="submit" id="chatSend">↑</button>
            </form>
        </aside>

        <!-- ── 中栏: 浏览器预览 + Workflow 日志 ── -->
        <section id="viewerPanel">
            <div class="panel-header">
                Screen Viewer
                <button class="btn-icon" id="refreshScreenshot" title="刷新截图">⟳</button>
            </div>
            <div class="viewer-screen" id="viewerScreen">
                <img id="screenshotImg" alt="Browser Screenshot" />
                <div class="viewer-placeholder" id="viewerPlaceholder">等待浏览器截图...</div>
            </div>
            <div class="panel-header" style="margin-top:4px;">Workflow Log</div>
            <div class="log-area" id="logArea"></div>
        </section>

        <!-- ── 右栏: Task Pool ── -->
        <aside id="taskPanel">
            <div class="panel-header">
                Task Pool
                <button class="btn-icon" id="addTaskBtn" title="添加任务">＋</button>
            </div>
            <div class="task-list" id="taskList">
                <div class="task-empty">暂无任务</div>
            </div>
        </aside>
    </main>

    <!-- ═══ 添加任务模态弹窗 (毛玻璃 Blur) ═══ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <div class="modal-title">添加新任务</div>
            <input type="text" id="modalTitle" placeholder="任务标题" />
            <textarea id="modalDetail" placeholder="任务详细描述 (可选)" rows="4"></textarea>
            <div class="modal-actions">
                <button class="btn-secondary" id="modalCancel">取消</button>
                <button class="btn-primary" id="modalConfirm">确认添加</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
